version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DEBUG=false
      - DATABASE_URL=sqlite:////app/data/immi_assist.db
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - RUN_INGEST_ON_START=true
    volumes:
      - chroma_data:/app/data/chroma_db
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  chroma_data:
  sqlite_data:
