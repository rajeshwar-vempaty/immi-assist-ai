global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: immiassist-backend
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    # When METRICS_REQUIRE_ADMIN=true, set admin key via prometheus bearer/authorization.
    # Default prod compose sets METRICS_REQUIRE_ADMIN=false so internal scrape works.
